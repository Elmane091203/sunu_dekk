name: sunu_dekk
description: "Sunu Dekk - Application mobile administrateur pour TerreAdmin"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Network
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.2
  sqflite: ^2.4.1
  path: ^1.9.0

  # Models / serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  intl: ^0.20.2
  flutter_svg: ^2.0.17

  # Features signature mobile
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  image_picker: ^1.1.2
  signature: ^5.5.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3

dependency_overrides:
  # analyzer_plugin 0.12.0 est incompatible avec analyzer 7.x.
  # Force une version compatible (analyzer_plugin 0.13.x supporte analyzer 7).
  analyzer_plugin: ^0.13.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/logo1.svg
    - assets/brand/logo2.svg
